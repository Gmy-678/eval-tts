sampling:
  method: "random"
  size: 10
  export_raw: "eval/output/raw_cases.csv"
  export_final: "eval/output/final_results.csv"

plugins:
  # ======== 1. з»„е»әиҜ„жөӢйӣҶпјҡи°ғз”Ё Gemini жү“ж Ү (Case Annotation) ========
  
  # 1.1 иҜӯиЁҖзұ»еһӢжү“ж Ү (еҚ•иҜӯиЁҖ-еӨҡиҜӯз§Қ, ж··еҗҲиҜӯиЁҖ-еӨҡиҜӯз§Қ)
  - name: "llm_language"
    config:
      model: "gemini-2.5-pro"
      max_retries: 3
      prompt_template: |
        You are a multilingual text analysis system.

        Task:
        Analyze the language distribution of the input text based on character composition.

        Supported languages (must explicitly classify into these when possible):
        - дёӯж–Ү (Chinese)
        - иӢұж–Ү (English)
        - ж—Ҙж–Ү (Japanese: Hiragana, Katakana, Kanji in Japanese context)
        - йҹ©ж–Ү (Korean: Hangul)
        - иҘҝзҸӯзүҷиҜӯ (Spanish)
        - еҚ°еәҰе°јиҘҝдәҡиҜӯ (Indonesian)
        - и‘Ўиҗ„зүҷиҜӯ (Portuguese)
        - жі•иҜӯ (French)
        - еҫ·иҜӯ (German)
        - е…¶д»– (Other)

        Steps:

        1. Character Identification:
        - дёӯж–Ү: \u4e00-\u9fff
        - иӢұж–Ү: a-zA-Z
        - ж—Ҙж–Ү: Hiragana + Katakana (+ Kanji based on Japanese context)
        - йҹ©ж–Ү: Hangul
        - Latin-based languages (иҘҝ/еҚ°е°ј/и‘Ў/жі•/еҫ·):
          вҶ’ Use vocabulary patterns, accents, and common words to distinguish

        2. Language Disambiguation Rules (IMPORTANT):
        - If Latin text has clear markers:
          - Spanish: Гұ, Вҝ, ВЎ, "ciГіn"
          - Portuguese: Г§ГЈo, ГЈ, Гө
          - French: Г©, ГЁ, ГӘ, Г , Г§
          - German: ГӨ, Г¶, Гј, Гҹ
          - Indonesian: tidak, yang, dengan
        - If strong signal exists вҶ’ classify accordingly
        - If NO strong signal:
          вҶ’ classify as иӢұж–Ү (default for Latin script)

        3. Fallback Rule (CRITICAL):
        - If text cannot be reliably classified into any supported language:
          вҶ’ assign to "е…¶д»–"
        - Use "е…¶д»–" ONLY when:
          - script is unknown
          - or language is clearly not in supported list
          - or mixed noise / unreadable content

        4. Ignore:
        - numbers
        - punctuation
        - spaces

        5. Compute ratio:
        percentage = (language_char_count / total_language_char_count) * 100

        6. Decision Rules:

        - еҚ•иҜӯз§Қ:
          If one language вүҘ 80%
          вҶ’ Output ONLY that language

        - еӨҡиҜӯз§Қ:
          Otherwise
          вҶ’ Output language distribution

        7. Post-processing:
        - Round to integers
        - Ensure total = 100
        - Sort descending

        Output format (STRICT):

        Case 1: еҚ•иҜӯз§Қ
        {{
          "type": "single",
          "language": "дёӯж–Ү"
        }}

        Case 2: еӨҡиҜӯз§Қ
        {{
          "type": "multi",
          "distribution": [
            {{"language": "иӢұж–Ү", "percentage": 60}},
            {{"language": "дёӯж–Ү", "percentage": 40}}
          ]
        }}

        Constraints:
        - Do NOT output explanations
        - Only JSON
        - Must follow schema strictly
        - Must always return a valid language (never empty)

        Input:
        {text}

  # 1.2 ж–Үжң¬зұ»еһӢжү“ж Ү
  - name: "llm_text_type"
    config:
      model: "gemini-2.5-pro"
      max_retries: 3
      prompt_template: |
        You are a text classification system.

        Task:
        Classify the input text into ONE primary category.

        Categories:
        - currency
        - time_date
        - number
        - abbreviation
        - proper_noun
        - plain_text

        --------------------------------
        STEP 1: TYPE DETECTION (MULTI-LABEL)
        --------------------------------

        Detect ALL possible types in the text:

        Definitions:

        - currency:
          Contains money symbols ($, вӮ¬, ВҘ, ВЈ) or units (USD, RMB, е…ғ)

        - time_date:
          Date, time, or temporal expressions

        - number:
          Pure numeric or numeric expression (including %, units like kg)

        - abbreviation:
          Short uppercase forms (length вүҘ 2), e.g. AI, CEO, USA

        - proper_noun:
          Specific names (person, brand, place), usually capitalized

        - plain_text:
          Natural language sentence OR
          any text with verbs, grammar, or multiple words forming meaning

        --------------------------------
        STEP 2: SENTENCE CHECK (CRITICAL)
        --------------------------------

        If the text:
        - contains verbs (is, are, was, have, еҺ», жҳҜ, еңЁ, etc.)
        - OR contains more than 3 words/tokens
        - OR forms a complete sentence

        вҶ’ MUST include "plain_text"

        --------------------------------
        STEP 3: DECISION RULE
        --------------------------------

        1. If "plain_text" is present AND more than one type exists:
           вҶ’ label = plain_text

        2. Else apply priority:

        currency > time_date > number > abbreviation > proper_noun

        3. Special rules:

        - Single character вҶ’ plain_text
        - Lowercase word вҶ’ NOT proper_noun
        - Abbreviation must be length вүҘ 2

        --------------------------------
        OUTPUT
        --------------------------------

        {{
          "label": ""
        }}
        
        Input:
        {text}

  # 1.3 йҹіиүІеұһжҖ§жү“ж Ү (д»Һж–Үжң¬жҺЁжөӢйў„жңҹеҸ‘йҹідәәзҡ„жҖ§еҲ«е’Ңе№ҙйҫ„ж®ө)
